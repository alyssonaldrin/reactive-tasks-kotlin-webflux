apiVersion: apps/v1
kind: Deployment
metadata:
  name: reactive-tasks-app
  namespace: reactive-tasks
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reactive-tasks-app
  template:
    metadata:
      labels:
        app: reactive-tasks-app
    spec:
      enableServiceLinks: false
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z kafka 9092; do echo esperando o Kafka...; sleep 3; done"
      containers:
        - name: app
          image: ghcr.io/alyssonaldrin/reactive-tasks-kotlin-webflux:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: SPRING_R2DBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: reactive-tasks-app
  namespace: reactive-tasks
spec:
  type: LoadBalancer
  selector:
    app: reactive-tasks-app
  ports:
    - port: 8080
      targetPort: 8080