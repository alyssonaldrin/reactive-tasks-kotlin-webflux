  input {
    beats {
    port => 5044
    }
  }
    
    filter {
    # Os logs já chegam como JSON (graças ao logstash-logback-encoder + hint
    # do Filebeat), então não é necessário fazer parsing manual com grok aqui.
    # Esse bloco existe como ponto de extensão futuro (ex: mascarar dados
    # sensíveis, enriquecer com geolocalização, etc).
  }
    
    output {
    elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "reactive-tasks-logs-%{+YYYY.MM.dd}"
    }
  }